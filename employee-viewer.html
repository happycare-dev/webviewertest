<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>従業員一覧</title>
  <link rel="stylesheet" href="employee-viewer.css" />
</head>
<body>
  <div class="title-bar">
    <div class="title-bar-main">
      <h2>従業員一覧</h2>
      <button type="button" class="btn-security" id="btnSecurityInfo" title="ログイン中のアカウントと権限を表示">権限確認</button>
    </div>
  </div>

  <div class="topbar">
    <div class="topbar-left">
      <span id="count">0 件</span>
      <span id="total"></span>
      <select id="locationFilter">
        <option value="">全事業所</option>
      </select>
    </div>
    <div class="topbar-right">
      <button type="button" id="btnPrev" disabled>◀ 前へ</button>
      <span id="pageInfo"></span>
      <button type="button" id="btnNext">次へ ▶</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th class="no-sort col-num" scope="col">#</th>
        <th data-key="fullName">氏名</th>
        <th data-key="location">事業所略名</th>
        <th data-key="status">在籍</th>
        <th data-key="joinDate">入社年月日</th>
        <th data-key="leaveDate">退職年月日</th>
        <th class="no-sort col-actions"></th>
        <!-- <th class="no-sort col-delete"></th> -->
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty">データがありません。</div>
  <div id="deleteModal">
    <div class="modal-box">
      <div class="modal-drag-handle" title="ドラッグして移動" aria-label="ドラッグして移動"></div>
      <p>「<span id="deleteModalFullName"></span>」のレコードを削除します。<br>よろしいでしょうか？</p>
      <div class="modal-btns">
        <button type="button" class="btn-yes" id="btnDeleteYes">はい</button>
        <button type="button" class="btn-no" id="btnDeleteNo">いいえ</button>
      </div>
    </div>
  </div>
  <div id="editModal">
    <div class="modal-box modal-box--form">
      <div class="modal-drag-handle" title="ドラッグして移動" aria-label="ドラッグして移動"></div>
      <h3 class="modal-title">レコードを編集</h3>
      <div class="edit-form">
        <label class="edit-label">氏名</label>
        <input type="text" id="editFullName" class="edit-input" autocomplete="off" />

        <label class="edit-label">事業所略名</label>
        <input type="text" id="editLocation" class="edit-input" autocomplete="off" />

        <!-- 在籍フラグは計算フィールドのため更新対象外。在籍区分など保存フィールドで編集可能にしたら復帰する。
        <label class="edit-label">在籍</label>
        <select id="editStatus" class="edit-input">
          <option value="1">在籍</option>
          <option value="0">退職</option>
        </select>
        -->

        <label class="edit-label">入社年月日</label>
        <input type="text" id="editJoinDate" class="edit-input" placeholder="YYYY/MM/DD" autocomplete="off" />

        <label class="edit-label">退職年月日</label>
        <input type="text" id="editLeaveDate" class="edit-input" placeholder="YYYY/MM/DD または空" autocomplete="off" />
      </div>
      <div class="modal-btns modal-btns--form">
        <button type="button" class="btn-save" id="btnEditSave" title="保存">💾 保存</button>
        <button type="button" class="btn-cancel" id="btnEditCancel" title="キャンセル">✕ キャンセル</button>
      </div>
    </div>
  </div>
  <div id="securityModal">
    <div class="modal-box modal-box--security">
      <div class="modal-drag-handle" title="ドラッグして移動" aria-label="ドラッグして移動"></div>
      <h3 class="modal-title">権限の確認</h3>
      <div class="security-modal-body">
        <div class="security-field">
          <div class="security-label">アカウント</div>
          <div class="security-value" id="secAccount">—</div>
        </div>
        <div class="security-field">
          <div class="security-label">権限セット</div>
          <div class="security-value" id="secPrivilegeSet">—</div>
        </div>
        <div class="security-field">
          <div class="security-label">レイアウトへのアクセス</div>
          <div class="security-value" id="secLayoutAccess">—</div>
        </div>
        <div class="security-field">
          <div class="security-label">レコードへのアクセス</div>
          <div class="security-value" id="secRecordAccess">—</div>
        </div>
        <div class="security-field security-field--block">
          <div class="security-label">許可された拡張アクセス（セキュリティの「拡張アクセス」に基づく）</div>
          <ul class="security-actions-list" id="secActionsList"></ul>
          <p class="security-hint" id="secActionsEmpty" hidden>拡張アクセスのキーワードはありません（権限セットに拡張アクセスが割り当てられていないか、取得できませんでした）。</p>
        </div>
      </div>
      <div class="modal-btns modal-btns--form">
        <button type="button" class="btn-close-modal" id="btnSecurityClose" title="閉じる">閉じる</button>
      </div>
    </div>
  </div>

  <script src="employee-viewer-core.js"></script>
  <script src="employee-viewer-utils-dom.js"></script>
  <script src="employee-viewer-table.js"></script>
  <script src="employee-viewer-data.js"></script>
  <script src="employee-viewer-actions.js"></script>
  <script src="employee-viewer-init.js"></script>
</body>
</html>
